<!--
  frontend/index.html
  ---------------------------------------------------------------------
  PUNTO DE ENTRADA del sistema. Aquí se inicia sesión contra el backend
  (POST /api/auth/login, en el puerto definido en config.js).
  Según el "rol" que devuelva el backend, se redirige automáticamente a:
    - ADMINISTRADOR -> panel-administrador.html
    - DISTRIBUIDOR  -> panel-distribuidor.html
    - VENDEDOR      -> panel-vendedor.html
  También se puede entrar directo a mezclados.html (panel combinado,
  ve todo junto sin importar el rol) usando el enlace de abajo.
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — Panel de Administración</title>
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-envoltura">
  <div class="login-caja">
    <div class="eyebrow">Panel de Administración · Acceso</div>
    <h1>Iniciar sesión</h1>
    <p class="sub">Backend + Oracle + GCP · contraseñas cifradas (bcrypt + AES-256-GCM)</p>

    <form id="form-login">
      <div>
        <label for="email">Correo</label>
        <input id="email" type="email" placeholder="admin@empresa.com" required>
      </div>
      <div>
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" required>
      </div>
      <div id="mensaje" class="mensaje"></div>
      <button class="principal" type="submit">Entrar</button>
    </form>

    <div class="puerto-footer">
      Conectando a <span id="txt-url" class="mono"></span>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById("txt-url").textContent = APP_CONFIG.API_BASE_URL;

  // Si ya hay sesión activa, saltar directo al panel correspondiente.
  const sesionActiva = leerSesion();
  if (sesionActiva) irAPanelSegunRol(sesionActiva.usuario.rol);

  document.getElementById("form-login").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("mensaje");
    msg.className = "mensaje";
    msg.textContent = "";

    try {
      const usuario = await iniciarSesion(email, password);
      msg.className = "mensaje ok";
      msg.textContent = "Bienvenido, " + usuario.nombre + ". Redirigiendo...";
      setTimeout(() => irAPanelSegunRol(usuario.rol), 500);
    } catch (err) {
      msg.className = "mensaje error";
      msg.textContent = err.message;
    }
  });
</script>
</body>
</html>
